name: mudhakkarati
description: "مذكراتي - تطبيق مذكرات وملاحظات يعمل بدون إنترنت بالكامل."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Local database (SQLite)
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3

  # Settings storage
  shared_preferences: ^2.2.3

  # Local notifications & reminders
  flutter_local_notifications: ^17.2.1+2
  timezone: ^0.9.4
  flutter_timezone: ^5.1.0

  # Media: images, audio, files, pdf
  image_picker: ^1.1.2
  record: ^7.0.0
  audioplayers: ^6.0.0
  file_picker: ^8.0.6
  open_filex: ^4.5.0

  # Drawing / handwriting
  signature: ^5.5.0

  # Security: biometric + secure storage
  local_auth: ^2.2.0
  flutter_secure_storage: ^9.2.2

  # Backup encryption + archiving
  encrypt: ^5.0.3
  crypto: ^3.0.3
  archive: ^3.6.1

  # Calendar (Gregorian + Hijri)
  table_calendar: ^3.1.2
  hijri: ^3.0.0

  # Home screen widget
  home_widget: ^0.6.0

  # Sharing
  share_plus: ^12.0.2

  # Misc
  intl: ^0.20.2
  uuid: ^4.4.0
  permission_handler: ^11.3.1
  flutter_quill: ^11.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # خط عربي اختياري: ضع ملفات Cairo في assets/fonts/ ثم ألغِ التعليق أدناه
  # لتفعيل خط عربي أجمل. التطبيق يعمل بدونها باستخدام خط النظام.
  # fonts:
  #   - family: Cairo
  #     fonts:
  #       - asset: assets/fonts/Cairo-Regular.ttf
  #       - asset: assets/fonts/Cairo-Bold.ttf
  #         weight: 700
  #       - asset: assets/fonts/Cairo-SemiBold.ttf
  #         weight: 600
