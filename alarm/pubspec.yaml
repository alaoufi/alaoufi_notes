name: mudhakkarati
description: "تنبيهات - تطبيق تذكيرات ومنبهات منبثق عن مذكراتي (مستقل للتطوير)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Local database (SQLite)
  path: ^1.9.0
  path_provider: ^2.1.3

  # Settings storage
  shared_preferences: ^2.2.3

  # Local notifications & reminders
  flutter_local_notifications: ^17.2.1+2
  timezone: ^0.9.4
  flutter_timezone: ^5.1.0

  # Media: images, audio, files, pdf
  pdf: ^3.11.1
  image_picker: ^1.1.2
  record: ^7.0.0
  audioplayers: ^6.0.0
  # Voice typing (on-device speech recognition)
  speech_to_text: ^7.0.0
  file_picker: ^8.0.6
  open_filex: ^4.5.0

  # Drawing / handwriting
  signature: ^5.5.0

  # Security: biometric + secure storage
  local_auth: ^2.2.0
  flutter_secure_storage: ^9.2.2

  # Backup encryption + archiving
  encrypt: ^5.0.3
  crypto: ^3.0.3
  archive: ^3.6.1

  # Calendar (Gregorian + Hijri)
  table_calendar: ^3.1.2
  hijri: ^3.0.0

  # Home screen widget
  home_widget: ^0.6.0

  # Sharing
  share_plus: ^12.0.2

  # فتح روابط الخرائط/المواقع (يفتح تطبيق الخرائط — يعمل دون إنترنت)
  url_launcher: ^6.3.0

  # منتقي ألوان احترافي (للوحة الرسم)
  flutter_colorpicker: ^1.1.0

  # Misc
  intl: ^0.20.2
  uuid: ^4.4.0
  permission_handler: ^11.3.1
  # Google Drive sync
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12
  flutter_quill: ^11.5.1
  flutter_staggered_grid_view: ^0.7.0
  sqflite_sqlcipher: ^3.4.0
  package_info_plus: ^9.0.1
  cryptography: ^2.9.0
  device_info_plus: ^12.4.0
  android_id: ^0.5.1
  dynamic_color: ^1.8.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # نغمات التنبيه (لمعاينتها داخل التطبيق قبل الاختيار).
  assets:
    - assets/sounds/

  # خطوط عربية مضمّنة في التطبيق (ثابتة الوزن — تعمل دون اتصال وعلى Impeller).
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
    - family: Almarai
