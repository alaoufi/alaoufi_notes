version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Riyadh
    open-pull-requests-limit: 5
    groups:
      next:
        patterns:
          - next
          - eslint-config-next
          - "@next/*"
      react:
        patterns:
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
      supabase:
        patterns:
          - "@supabase/*"
      lint-and-test:
        patterns:
          - eslint*
          - prettier*
          - vitest*
          - "@vitest/*"
          - "@testing-library/*"
      types:
        patterns:
          - "@types/*"
      minor-and-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - ci
