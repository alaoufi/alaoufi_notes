name: Alaoufi Notes APK (مؤقت)

# ملف مؤقت على main لبناء تطبيق Alaoufi Notes من فرعه المنفصل.
# يُشغَّل تلقائيًا بالجدولة (لأن الدفعات الآلية لا تُطلق البناء)، يبني الـ APK
# ثم يدفعه إلى فرع apk-dist لتسليمه. سيُحذف بعد التسليم ليبقى main نظيفًا.
# كود التطبيق لا يُوضع على main إطلاقًا — يُجلب من الفرع المنفصل عند البناء فقط.

on:
  workflow_dispatch: {}
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: write

concurrency:
  group: alaoufi-apk
  cancel-in-progress: false

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: جلب فرع التطبيق
        uses: actions/checkout@v4
        with:
          ref: claude/modhkrati-notes-app-KS0zZ

      - name: تهيئة Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: تهيئة Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.0
          cache: true

      - name: بناء APK
        working-directory: mudhakkarati
        run: |
          flutter pub get
          flutter build apk --release --build-number=${{ github.run_number }}

      - name: دفع APK إلى فرع apk-dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/apkout
          cp mudhakkarati/build/app/outputs/flutter-apk/app-release.apk /tmp/apkout/AlaoufiNotes.apk
          cd /tmp/apkout
          git init -q
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git checkout -q -b apk-dist
          git add AlaoufiNotes.apk
          git commit -q -m "Alaoufi Notes APK build ${{ github.run_number }}"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" apk-dist
