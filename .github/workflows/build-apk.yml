name: بناء APK لتطبيق مذكراتي

# يبني ملف APK تلقائيًا على خوادم GitHub، يدفعه إلى فرع apk-dist للتسليم،
# وينشر سجل البناء إلى فرع build-log دائمًا (للتشخيص عند الفشل).

on:
  push:
    branches:
      - main
      - claude/repository-data-check-41e6pd
    paths:
      - 'mudhakkarati/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: جلب الكود
        uses: actions/checkout@v4

      - name: تهيئة Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: تهيئة Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.0
          cache: true

      - name: بناء APK (مع التقاط السجل)
        working-directory: mudhakkarati
        run: |
          set -o pipefail
          # versionCode تصاعديّ كبير = الدقائق منذ 1970 (~29.7 مليون الآن). أُعيد
          # ضبط github.run_number سابقًا فصار أقلّ من versionCode المثبّت (2376)،
          # فكان أندرويد يرفض التثبيت كـ«تنزيل لإصدار أقدم». هذا الرقم يتجاوز أي
          # بناء قديم ويبقى يتزايد للأبد، وآمن تحت حدّ أندرويد (2,147,483,647).
          VCODE=$(( $(date -u +%s) / 60 ))
          echo "VCODE=$VCODE" >> "$GITHUB_ENV"
          echo "versionCode = $VCODE"
          {
            echo "===== flutter pub get ====="
            flutter pub get
            echo "===== flutter test (يفشل البناء عند فشل أي اختبار) ====="
            flutter test --reporter expanded
            echo "===== flutter build apk (split per abi, obfuscated) ====="
            flutter build apk --release --split-per-abi --build-number=$VCODE \
              --obfuscate --split-debug-info=build/symbols
            echo "===== flutter build appbundle (Google Play, obfuscated) ====="
            flutter build appbundle --release --build-number=$VCODE \
              --obfuscate --split-debug-info=build/symbols
            echo "===== sizes ====="
            ls -lh build/app/outputs/flutter-apk/
            ls -lh build/app/outputs/bundle/release/
          } 2>&1 | tee /tmp/build.log

      - name: نشر سجل البناء إلى فرع build-log (تشخيص)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/logout
          tail -n 500 /tmp/build.log > /tmp/logout/build.log 2>/dev/null || echo "no log captured" > /tmp/logout/build.log
          cd /tmp/logout
          git init -q
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git checkout -q -b build-log
          git add build.log
          git commit -q -m "build log #${{ github.run_number }}"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" build-log

      - name: دفع APK (arm64 الأصغر) إلى فرع apk-dist (تسليم)
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/apkout
          APKDIR=mudhakkarati/build/app/outputs/flutter-apk
          cp "$APKDIR/app-arm64-v8a-release.apk" /tmp/apkout/AlaoufiNotes.apk
          # ملف نسخة للتحديث داخل التطبيق (يقارنه UpdateService برقم بناء التطبيق).
          VER=$(grep '^version:' mudhakkarati/pubspec.yaml | sed 's/version: //; s/+.*//' | tr -d '[:space:]')
          printf '{"version":"%s","build":%s,"url":"%s"}\n' \
            "$VER" "${VCODE}" \
            "https://github.com/${{ github.repository }}/releases/download/latest/app-arm64-v8a-release.apk" \
            > /tmp/apkout/version.json
          cd /tmp/apkout
          git init -q
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git checkout -q -b apk-dist
          git add AlaoufiNotes.apk version.json
          git commit -q -m "Alaoufi Notes APK (arm64) #${{ github.run_number }}"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" apk-dist

      - name: تجهيز نسخ باسمٍ يتضمّن رقم النسخة (للتمييز عند التنزيل)
        if: success()
        run: |
          VER=$(grep '^version:' mudhakkarati/pubspec.yaml | sed 's/version: //; s/+.*//' | tr -d '[:space:]')
          mkdir -p /tmp/release
          APKDIR=mudhakkarati/build/app/outputs/flutter-apk
          cp "$APKDIR/app-arm64-v8a-release.apk"   "/tmp/release/AlaoufiNotes_${VER}.apk"
          cp "$APKDIR/app-armeabi-v7a-release.apk" "/tmp/release/AlaoufiNotes_${VER}_v7a.apk"
          echo "VER=$VER" >> "$GITHUB_ENV"
          ls -lh /tmp/release

      - name: نشر في Releases (تحميل مباشر من المتصفّح)
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Alaoufi Notes — أحدث نسخة
          body: |
            النسخة الحاليّة: **${{ env.VER }}**

            للتمييز عند التنزيل، استخدم الملفّ الذي يحمل رقم النسخة في اسمه:
            • AlaoufiNotes_${{ env.VER }}.apk — لمعظم الأجهزة الحديثة (يُنصح به)
            • AlaoufiNotes_${{ env.VER }}_v7a.apk — لأجهزة 32-بت القديمة

            (الاسم الثابت `app-arm64-v8a-release.apk` يبقى للتحديث الداخليّ والرابط الثابت.)
          files: |
            mudhakkarati/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            mudhakkarati/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            mudhakkarati/build/app/outputs/flutter-apk/app-x86_64-release.apk
            mudhakkarati/build/app/outputs/bundle/release/app-release.aab
            /tmp/release/AlaoufiNotes_${{ env.VER }}.apk
            /tmp/release/AlaoufiNotes_${{ env.VER }}_v7a.apk

      - name: رفع APK كـ Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AlaoufiNotes-apk
          path: |
            mudhakkarati/build/app/outputs/flutter-apk/*.apk
            mudhakkarati/build/app/outputs/bundle/release/app-release.aab

      # نشر النسخة في مستودع عام مخصّص للتحميل المباشر بلا تسجيل دخول.
      # يعمل فقط إذا ضُبط السرّ PUBLIC_APK_TOKEN (رمز وصول شخصي بصلاحية
      # Contents: write على المستودع العام)، وإلا يُتخطّى دون فشل البناء.
      - name: نشر APK في المستودع العام (تحميل مباشر)
        if: success()
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_APK_TOKEN }}
          PUBLIC_REPO: alaoufi/alaoufi-notes-apk
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "PUBLIC_APK_TOKEN غير مضبوط — تخطّي النشر في المستودع العام."
            exit 0
          fi
          APKDIR=mudhakkarati/build/app/outputs/flutter-apk
          NOTES="حمّل الملف المناسب لجوالك وثبّته:
          • app-arm64-v8a-release.apk — لمعظم الأجهزة الحديثة (يُنصح به)
          • app-armeabi-v7a-release.apk — لأجهزة 32-بت القديمة
          • app-x86_64-release.apk — للمحاكيات"
          if gh release view latest --repo "$PUBLIC_REPO" >/dev/null 2>&1; then
            gh release upload latest "$APKDIR"/*.apk --repo "$PUBLIC_REPO" --clobber
          else
            gh release create latest "$APKDIR"/*.apk --repo "$PUBLIC_REPO" \
              --title "Alaoufi Notes — أحدث نسخة" --notes "$NOTES"
          fi


