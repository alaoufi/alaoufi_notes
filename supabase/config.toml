# Supabase project configuration for Syanah.
# Reference: https://supabase.com/docs/guides/local-development/cli/config
project_id = "syanah"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 16

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/ar/auth/callback", "http://localhost:3000/en/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 8

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true

[auth.sms]
enable_signup = false
enable_confirmations = true
template = "Syanah: رمز التحقّق هو {{ .Code }}. لا تُشاركه مع أحد."

# Production providers are wired in dashboard env, not committed here.
[auth.sms.twilio]
enabled = false

[edge_runtime]
enabled = true
inspector_port = 8083

[analytics]
enabled = false
